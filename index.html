<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#315c48"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="茶样志"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="assets/icon-192.png"><link rel="stylesheet" href="styles.css"><title>茶样志</title></head><body>
<header><div><h1>茶样志</h1><p>茶叶品评记录与积累</p></div><button id="installBtn" class="ghost hidden">安装</button></header>
<main>
<section id="home" class="view active"><div class="hero"><button class="primary big" data-go="newBatch">＋ 开始新的品评</button></div><div class="stats"><div><b id="batchCount">0</b><span>批次</span></div><div><b id="sampleCount">0</b><span>样品</span></div><div><b id="todayCount">0</b><span>今日样品</span></div></div><h2>最近批次</h2><div id="recentBatches" class="cards empty">暂无记录</div></section>
<section id="newBatch" class="view"><div class="topline"><button class="back" data-go="home">‹</button><h2>新建品评批次</h2></div><form id="batchForm" class="form"><label>批次名称<input id="batchName" required placeholder="如：红茶轮岗 上午"></label><label>茶类<select id="teaCategory"></select></label><label>地点<input id="batchPlace" placeholder="可不填"></label><label>备注<textarea id="batchNote" rows="3"></textarea></label><button class="primary" type="submit">创建并录入样品</button></form></section>
<section id="batchDetail" class="view"><div class="topline"><button class="back" data-go="home">‹</button><div><h2 id="detailTitle">批次</h2><small id="detailMeta"></small></div></div><div class="actions"><button id="addSampleBtn" class="primary">＋ 拍照录入样品</button><button id="exportBatchBtn" class="ghost">导出本批次 CSV</button></div><div id="sampleList" class="cards empty">暂无样品</div></section>
<section id="sampleEdit" class="view"><div class="topline"><button class="back" id="sampleBack">‹</button><h2 id="sampleTitle">样品</h2></div><form id="sampleForm" class="form"><label class="photoBox"><img id="samplePreview" alt="样品照片"><span id="photoHint">点击拍摄或选择样品袋照片</span><input id="samplePhoto" type="file" accept="image/*" capture="environment"></label><div class="inline"><button type="button" id="ocrBtn" class="ghost">识别包装文字</button><small id="ocrStatus">联网时可用，识别后请人工确认</small></div><label>样品名称<input id="sampleName" placeholder="如：金骏眉"></label><label>样品编号<input id="sampleCode" placeholder="包装或内部编号"></label><label>公司<input id="sampleCompany" placeholder="公司或品牌"></label>
<h3>香气评分</h3><div id="aromaScoreList" class="scoreList"></div><button type="button" id="addAromaBtn" class="ghost">+ 添加香气</button>
<textarea id="myAroma" style="display:none"></textarea>
<div class="chips" data-target="myAroma"></div>
<h3>滋味评分</h3><div id="tasteScoreList" class="scoreList"></div><button type="button" id="addTasteBtn" class="ghost">+ 添加滋味</button>
<textarea id="myTaste" style="display:none"></textarea>
<div class="chips" data-target="myTaste"></div><p class="tip">语音输入：点击文本框后，使用 iPhone 键盘上的麦克风进行听写。</p><label>备注<textarea id="sampleNote" rows="3"></textarea></label><button class="primary" type="submit">保存样品</button><button class="danger" id="deleteSampleBtn" type="button">删除样品</button></form></section>
<section id="history" class="view"><div class="topline"><h2>历史记录</h2></div><input id="searchInput" class="search" placeholder="搜索名称、编号、公司、香气、滋味"><div id="historyList" class="cards"></div></section>
<section id="settings" class="view"><div class="topline"><h2>设置与数据</h2></div><div class="panel"><h3>茶类管理</h3><div id="categoryList" class="taglist"></div><div class="inline"><input id="newCategory" placeholder="新增茶类"><button id="addCategoryBtn" class="ghost">添加</button></div></div><div class="panel"><h3>数据管理</h3><button id="exportAllBtn" class="ghost block">导出全部 CSV</button><button id="backupBtn" class="ghost block">备份全部数据（JSON）</button><label class="ghost block fileBtn">恢复备份<input id="restoreInput" type="file" accept="application/json"></label><button id="clearBtn" class="danger block">清空全部数据</button></div><div class="panel"><h3>安装到 iPhone 桌面</h3><p>请用 Safari 打开本网页，点击底部“分享”按钮，再选择“添加到主屏幕”。</p></div></section>
</main>
<nav><button data-go="home" class="active">首页</button><button data-go="history">历史</button><button data-go="settings">设置</button></nav>

<div id="compareModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="compareTitle">
  <div class="modalCard">
    <div class="modalHead"><div><small>保存成功</small><h2 id="compareTitle">我 vs 他人 品评对照</h2></div><button id="closeCompareBtn" class="modalClose" type="button">×</button></div>
    <section class="compareSection"><h3>香气</h3><div class="compareGrid"><div><span class="compareLabel">共同品出</span><div id="commonAroma" class="resultTags"></div></div><div><span class="compareLabel missingLabel">我没有品出</span><div id="missingAroma" class="resultTags"></div></div></div></section>
    <section class="compareSection"><h3>滋味</h3><div class="compareGrid"><div><span class="compareLabel">共同品出</span><div id="commonTaste" class="resultTags"></div></div><div><span class="compareLabel missingLabel">我没有品出</span><div id="missingTaste" class="resultTags"></div></div></div></section>
    <p class="compareTip">“我没有品出”指他人记录中出现、但我的记录中未匹配到的关键词。</p>
    <button id="compareDoneBtn" class="primary block" type="button">完成并返回批次</button>
  </div>
</div>
<script src="app.js"></script></body></html>
